<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asociación Abaniko · Animación Abanico</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    padding: 1.5rem;
  }
  #logo-bar {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 1.5rem;
  }
  #logo-bar img { height: 54px; border-radius: 8px; }
  #logo-bar div { font-size: 13px; color: #666; line-height: 1.5; }
  #logo-bar strong { font-size: 15px; color: #1a1a1a; display: block; }

  #fan-stage {
    position: relative;
    width: 100%;
    height: 420px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: visible;
  }
  .fan-pivot {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #1a1a1a;
    z-index: 20;
    box-shadow: 0 0 0 4px #f5f4f0;
  }
  .fan-letter {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform-origin: center bottom;
    width: 44px; height: 160px;
    margin-left: -22px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 10px;
    border-radius: 22px 22px 0 0;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    user-select: none;
    transition: transform 0.7s cubic-bezier(.4,0,.2,1), opacity 0.5s ease;
    opacity: 0;
    transform: rotate(0deg);
    border: 2px solid rgba(255,255,255,0.3);
    cursor: default;
  }
  .fan-letter span {
    display: block;
    line-height: 1;
    text-shadow: 0 2px 6px rgba(0,0,0,0.35);
    font-size: 26px;
    font-weight: 700;
  }

  .status-label {
    text-align: center;
    font-size: 12px;
    color: #888;
    min-height: 20px;
    margin-top: 8px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  #btn-replay {
    display: flex; align-items: center; gap: 6px;
    margin: 0.75rem auto 0;
    font-size: 13px; padding: 6px 16px;
    cursor: pointer;
    border-radius: 8px;
    background: transparent;
    border: 1px solid #ccc;
    color: #1a1a1a;
  }
  #btn-replay:hover { background: #eee; }

  #photo-carousel {
    width: 100%;
    border-radius: 12px;
    border: 1px solid #ddd;
    overflow: hidden;
    margin-top: 2rem;
    position: relative;
  }
  .carousel-inner {
    display: flex;
    transition: transform 0.6s cubic-bezier(.4,0,.2,1);
  }
  .carousel-slide {
    min-width: 100%;
    max-height: 260px;
    overflow: hidden;
    background: #eee;
    position: relative;
  }
  .carousel-slide img {
    width: 100%; height: 260px;
    object-fit: cover; display: block;
  }
  .carousel-slide .cap {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 10px 14px;
    background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
    color: #fff; font-size: 13px; font-weight: 500;
  }
  .c-nav {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.85);
    border: 1px solid #ccc;
    border-radius: 50%;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 5;
    font-size: 20px; color: #1a1a1a;
  }
  .c-nav:hover { background: #fff; }
  .c-nav.left { left: 10px; }
  .c-nav.right { right: 10px; }
  .c-dots { display: flex; justify-content: center; gap: 5px; padding: 10px 0 12px; }
  .c-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #ccc; cursor: pointer; transition: background 0.2s;
  }
  .c-dot.on { background: #1a1a1a; }
</style>
</head>
<body>

<div id="logo-bar">
  <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiwNzVX0fOq1eC1GGlUCVY9Kij45wQBgZNy25IoZeL9CLhpDtmXeyEG8zpwUP6VXm_2S_2MzW_IzeU8KH7Lt6j1_bR6aiJFyJNqmhTcoFZcJJsf0CC6e9SOVEG9LcLsNy_a9-Hti_Pe_64/s1600/LogoBlog.png" alt="Logo Asociación Abaniko" onerror="this.style.display='none'">
  <div>
    <strong>Asociación Abaniko</strong>
    Cádiz · Mejorando vidas desde 2009
  </div>
</div>

<div id="fan-stage">
  <div class="fan-pivot"></div>
</div>

<div class="status-label" id="status-lbl">Abriendo el abanico...</div>
<div style="display:flex;justify-content:center;">
</div>
7
<div id="photo-carousel">
  <div class="carousel-inner" id="ci"></div>
  <button class="c-nav left" onclick="moveC(-1)" aria-label="Anterior">&#8249;</button>
  <button class="c-nav right" onclick="moveC(1)" aria-label="Siguiente">&#8250;</button>
  <div class="c-dots" id="cdots"></div>
</div>

<script>
const LETTERS = ['A','B','A','N','I','K','O'];
const COLORS  = ['#E24B4A','#D85A30','#BA7517','#3B6D11','#1D9E75','#185FA5','#534AB7'];

const PHOTOS = [
  {
    url: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhNlsB_c4cefwP6KQLQBX3y5oCLcT_4JUIQnR1VJeDVUIQe5Z2O-hCUPmrGl_M1gACaKOn0VHIFIJ1jgYZXzuZjPrgPs74z1iEiT-Ugy0ixLhmxqzZb1-paD2Rgyx2eQOB7rtjPCfvb9kV5vsL2rlfc9BdI-RcfQh9eLUkHvTlBoZFUY1gGQeZomCUuRSR_/w400-h300/2ab77e38-d7e8-4732-8659-e2342d4f5546.jpg',
    cap: 'Museo del Carnaval · Abaniko'
  },
  {
    url: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhfbshQ0li8RTbCKUk_JSMFjzAYpdtSFN_S7RkJF1X4v-ARc7T1hECCFco7BMsOlNMw-BxHxiHBs21x5mTfN1EbIAvvBh8n2dh5JOIRBh1VWSE5SHh2HOiONJvRRUPWY_0w5Yz9oZXJGvBIHIRlrqxeFHHGb4A8GGRiX53iXKDpbBVMhVyeNTb9Vvz0Q/w400-h300/b9dbd3e9-b028-42fd-b73b-14be9f33c9c0.jpg',
    cap: 'Actividades · Grupo de Ocio'
  },
  {
    url: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgzvub-d0_RVOQ_jNrGuWtk-4QfE8u3_FosMgDHrbjCQLD41yBYJytrCpA0z_OMbKR-AGUer47R-Q1GOCa2WwserwudBYGM8BCj7RkWd4GDjnwIxRpsLDh9T8aVxD2tQPVFoPzki9nTrSuARmeuCz-LzODvV2zF5zsu3vIe5d8GKIo-TWSi9AeI4zpeL-Dd/w453-h640/PosterTaller.jpg',
    cap: 'Programa de Autonomía Doméstica 2024'
  },
  {
    url: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiwNzVX0fOq1eC1GGlUCVY9Kij45wQBgZNy25IoZeL9CLhpDtmXeyEG8zpwUP6VXm_2S_2MzW_IzeU8KH7Lt6j1_bR6aiJFyJNqmhTcoFZcJJsf0CC6e9SOVEG9LcLsNy_a9-Hti_Pe_64/s1600/LogoBlog.png',
    cap: 'Asociación Abaniko · Cádiz desde 2009'
  }
];

const stage = document.getElementById('fan-stage');
let letterEls = [];
let phase = 'idle';

function buildFan() {
  stage.querySelectorAll('.fan-letter').forEach(e => e.remove());
  letterEls = [];
  LETTERS.forEach((l, i) => {
    const el = document.createElement('div');
    el.className = 'fan-letter';
    el.style.background = COLORS[i];
    el.style.transform = 'rotate(0deg)';
    el.style.opacity = '0';
    el.style.zIndex = i + 1;
    el.innerHTML = `<span>${l}</span>`;
    stage.appendChild(el);
    letterEls.push(el);
  });
}

function getOpenAngle(i, total) {
  const spread = 140;
  const start = -(spread / 2);
  return start + (i / (total - 1)) * spread;
}

function startAnimation() {
  if (phase === 'running') return;
  phase = 'running';
  buildFan();
  document.getElementById('status-lbl').textContent = 'Abriendo el abanico...';

  const step = 220;

  LETTERS.forEach((l, i) => {
    setTimeout(() => {
      const el = letterEls[i];
      el.style.transition = 'opacity 0.4s ease, transform 0.7s cubic-bezier(.4,0,.2,1)';
      el.style.opacity = '1';
      el.style.transform = `rotate(${getOpenAngle(i, LETTERS.length)}deg)`;
    }, i * step);
  });

  const openDone = LETTERS.length * step + 800;

  setTimeout(() => {
    document.getElementById('status-lbl').textContent = 'Cerrando el abanico...';
  }, openDone);

  setTimeout(() => {
    LETTERS.forEach((l, i) => {
      const el = letterEls[i];
      el.style.transition = 'transform 0.8s cubic-bezier(.4,0,.2,1)';
      el.style.transform = `rotate(${i * 5 - 15}deg)`;
    });
  }, openDone + 1000);

  setTimeout(() => {
    document.getElementById('status-lbl').textContent = 'ABANIKO · Las letras permanecen ✦';
    phase = 'idle';
  }, openDone + 2200);
}

// --- CARRUSEL ---
let cIdx = 0;
const ci    = document.getElementById('ci');
const cdots = document.getElementById('cdots');

function buildCarousel() {
  PHOTOS.forEach((p, i) => {
    const slide = document.createElement('div');
    slide.className = 'carousel-slide';
    slide.innerHTML = `<img src="${p.url}" alt="${p.cap}" loading="lazy"><div class="cap">${p.cap}</div>`;
    ci.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = 'c-dot' + (i === 0 ? ' on' : '');
    dot.onclick = () => goC(i);
    cdots.appendChild(dot);
  });
}

function goC(idx) {
  cIdx = (idx + PHOTOS.length) % PHOTOS.length;
  ci.style.transform = `translateX(-${cIdx * 100}%)`;
  cdots.querySelectorAll('.c-dot').forEach((d, i) => d.classList.toggle('on', i === cIdx));
}

function moveC(dir) { goC(cIdx + dir); }

buildCarousel();
setTimeout(startAnimation, 600);
setInterval(() => moveC(1), 4500);
</script>

</body>
</html>
